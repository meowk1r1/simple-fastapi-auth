version: "3.8"

x-defaults: &defaults
  restart: always
  image: meow
  logging:
    options:
      max-size: "10m"
      max-file: "3"

  env_file: .env


services:
  postgres:
    image: postgres:17.4
    container_name: simpdb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DATABASE_PORT_EXTERNAL}:${DATABASE_PORT_INTERNAL}"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    tty: true
    stdin_open: true

volumes:
  pgdata:
    driver: local
networks:
    app_network:
      driver: bridge